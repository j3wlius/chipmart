default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost
  username: chipmart
  password: chipmart_dev



development:
  <<: *default
  database: chipmart_development

test:
  <<: *default
  database: chipmart_test

production:
  primary: &primary_production
    <<: *default
    database: chipmart_production
    username: chipmart
    password: <%= ENV["CHIPMART_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: chipmart_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: chipmart_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: chipmart_production_cable
    migrations_paths: db/cable_migrate
